grafana:
  adminUser: admin
  # adminPassword 不進版控，安裝時用 --set 帶入

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca-issuer
    hosts:
      - grafana.192.168.100.200.nip.io
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.192.168.100.200.nip.io

  persistence:
    enabled: true
    type: sts
    storageClassName: longhorn
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      editable: false

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca-issuer
    hosts:
      - prometheus.192.168.100.200.nip.io
    paths:
      - /
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.192.168.100.200.nip.io

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca-issuer
    hosts:
      - alertmanager.192.168.100.200.nip.io
    paths:
      - /
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.192.168.100.200.nip.io
