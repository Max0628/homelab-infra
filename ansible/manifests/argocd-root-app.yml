apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.192.168.100.200.nip.io/homelab/k8s.git
    targetRevision: main
    path: .
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
